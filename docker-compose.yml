services:
  # Serveur d'inférence Ollama (Phi-3.5-Financial).
  ollama:
    image: ollama/ollama:latest
    container_name: techcorp-ollama
    ports:
      - "11434:11434"          # accessible aux DEV WEB du groupe
    volumes:
      - ollama_data:/root/.ollama
      - ./infra/ollama:/modelfiles:ro
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    # GPU optionnel : décommenter si NVIDIA + nvidia-container-toolkit
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Crée le modèle 'phi35-financial' depuis le Modelfile au démarrage, puis sort.
  ollama-init:
    image: ollama/ollama:latest
    container_name: techcorp-ollama-init
    depends_on:
      - ollama
    volumes:
      - ./infra/ollama:/modelfiles:ro
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: >
      sh -c "sleep 5 &&
             ollama pull phi3.5 &&
             ollama create phi35-financial -f /modelfiles/Modelfile &&
             echo 'Modele phi35-financial pret.'"
    restart: "no"

  # Passerelle API maison (REST propre + CORS) pour l'équipe DEV WEB.
  gateway:
    build: ./infra/fastapi_server
    container_name: techcorp-gateway
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MODEL_NAME=phi35-financial
    restart: unless-stopped

volumes:
  ollama_data:
